name: Release

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v1.0, v2.3.1, etc.

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: logfilter-linux
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build (Linux, static musl)
        run: |
          rustup target add x86_64-unknown-linux-musl
          rustc --edition 2021 --target x86_64-unknown-linux-musl -C opt-level=2 src/main.rs -o logfilter
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logfilter-linux
          path: logfilter

  build-windows:
    runs-on: windows-latest
    outputs:
      artifact-name: logfilter-windows
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build (Windows)
        run: |
          rustc --edition 2021 -C opt-level=2 -C target-feature=+crt-static src/main.rs -o logfilter.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logfilter-windows
          path: logfilter.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: logfilter-linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: logfilter-windows
          path: artifacts/windows
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/logfilter
            artifacts/windows/logfilter.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}